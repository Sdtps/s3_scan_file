repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1 # Use the latest version from GitHub
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
    args:
    - --args=--output-file README.md
    - id: terraform_tflint
    args:
    - --args=--module
    - --args=--enable-rule=terraform_documented_variables