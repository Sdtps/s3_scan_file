repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1 # Use the latest version from GitHub
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
    args:
    - --hook-config=--delegate-chdir
      - id: terraform_docs
    args:
    - --args=--output-file README.md